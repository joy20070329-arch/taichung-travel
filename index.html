<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>台中旅遊：看風景 放輕鬆</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #faf6f0;
            --warm-brown: #8b5e3c;
            --terracotta: #c97941;
            --ink: #1e1a16;
            --mist: #e8e0d5;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; height: 100%; }

        body {
            background-color: var(--cream);
            color: var(--ink);
            font-family: 'Noto Serif TC', serif;
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            min-height: 100%;
        }

        /* --- 頂部視覺區 --- */
        .hero {
            height: 50vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1593100126453-19b562a800c1?q=80&w=1467&auto=format&fit=crop') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            padding-top: var(--safe-top);
        }

        .hero-title {
            font-size: clamp(2.5rem, 10vw, 4rem);
            font-weight: 900;
            text-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .hero-subtitle { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.2rem; opacity: 0.9; letter-spacing: 2px; }

        /* --- 導航列 --- */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(250, 246, 240, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--mist);
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
        }

        .nav-link {
            text-decoration: none;
            color: var(--warm-brown);
            font-weight: 700;
            font-size: 0.95rem;
            position: relative;
        }

        .nav-link.active { color: var(--terracotta); }
        .nav-link.active::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--terracotta);
        }

        /* --- 內容區塊 --- */
        main { flex: 1; padding: 20px; max-width: 800px; margin: 0 auto; width: 100%; }
        
        .section { display: none; animation: fadeIn 0.5s ease forwards; }
        .section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .item-card {
            display: flex;
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            margin-bottom: 25px;
            border: 1px solid var(--mist);
        }

        .card-img { width: 35%; min-width: 130px; object-fit: cover; background: var(--mist); }
        .card-body { padding: 20px; flex: 1; }
        .card-body h3 { font-size: 1.3rem; margin-bottom: 10px; color: var(--ink); }
        .card-body p { font-size: 0.9rem; color: #555; }

        footer {
            background: var(--ink);
            color: rgba(255,255,255,0.4);
            text-align: center;
            padding: 40px 20px calc(20px + var(--safe-bottom));
            font-size: 0.8rem;
        }

        @media (max-width: 600px) {
            .item-card { flex-direction: column; }
            .card-img { width: 100%; height: 200px; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <div>
            <h1 class="hero-title">台中旅遊</h1>
            <p class="hero-subtitle">Scenery & Relaxation</p>
        </div>
    </section>

    <nav id="navbar">
        <a href="javascript:void(0)" class="nav-link active" onclick="switchTab('food', this)">在地美食</a>
        <a href="javascript:void(0)" class="nav-link" onclick="switchTab('landmarks', this)">地標建築</a>
        <a href="javascript:void(0)" class="nav-link" onclick="switchTab('vibe', this)">民情風俗</a>
    </nav>

    <main>
        <section id="food" class="section active">
            </section>
        <section id="landmarks" class="section">
        </section>
        <section id="vibe" class="section">
        </section>
    </main>

    <footer>
        <p>© 2026 台中旅遊誌 · 看風景 放輕鬆</p>
    </footer>

    <script>
        // 資料設定區
        const data = {
            food: [
                { name: "珍珠奶茶", desc: "發源於台中的文化名片，正宗茶香與Q彈珍珠的完美結合。", img: "https://images.unsplash.com/photo-1525203135335-74d292fb8d5c?q=80&w=1000&auto=format&fit=crop" },
                { name: "太陽餅", desc: "手工揉製千層酥皮，包裹著甜而不膩的麥芽糖內餡。", img: "https://travel.taichung.gov.tw/Utility/DisplayImage?id=25381" }
            ],
            landmarks: [
                { name: "國家歌劇院", desc: "曲牆建築奇蹟，由大師伊東豊雄設計，台中最美地標。", img: "https://images.unsplash.com/photo-1593100126453-19b562a800c1?q=80&w=1000&auto=format&fit=crop" },
                { name: "高美濕地", desc: "世界級落日景觀，夕陽倒映在濕地上形成的鏡面效果。", img: "https://travel.taichung.gov.tw/Utility/DisplayImage?id=25574" }
            ],
            vibe: [
                { name: "夜市文化", desc: "逢甲夜市的熱鬧氛圍，展現台中人熱情且充滿創意的生活氣息。", img: "https://images.unsplash.com/photo-1571431627063-44706509f7a5?q=80&w=1000&auto=format&fit=crop" }
            ]
        };

        // 切換分頁功能
        function switchTab(id, el) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            window.scrollTo({ top: document.getElementById('navbar').offsetTop, behavior: 'smooth' });
        }

        // 初始化渲染卡片
        function render() {
            for (const key in data) {
                const container = document.getElementById(key);
                data[key].forEach(item => {
                    container.innerHTML += `
                        <div class="item-card">
                            <img src="${item.img}" class="card-img" alt="${item.name}">
                            <div class="card-body">
                                <h3>${item.name}</h3>
                                <p>${item.desc}</p>
                            </div>
                        </div>
                    `;
                });
            }
        }
        render();
    </script>
</body>
</html>
