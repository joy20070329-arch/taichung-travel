<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>台中旅遊：看風景 放輕鬆</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #faf6f0;
            --warm-brown: #8b5e3c;
            --terracotta: #c97941;
            --ink: #1e1a16;
            --mist: #e8e0d5;
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--cream);
            color: var(--ink);
            font-family: 'Noto Serif TC', serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden; /* 防止 iOS 橫向跳動 */
        }

        /* 頂部 Header：使用具有標誌性的台中地際線或高美濕地 */
        .hero {
            height: 40vh;
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), 
                        url('https://travel.taichung.gov.tw/image/25574/1024x768') center/cover no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            padding-top: var(--safe-top);
        }

        .hero-title { font-size: clamp(2rem, 10vw, 3rem); font-weight: 900; text-shadow: 0 4px 10px rgba(0,0,0,0.3); }

        /* 導航列：加入毛玻璃效果，更符合 iOS 審美 */
        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(250, 246, 240, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            border-bottom: 1px solid var(--mist);
        }

        .nav-link { text-decoration: none; color: var(--warm-brown); font-weight: 700; font-size: 0.9rem; touch-action: manipulation; }
        .nav-link.active { color: var(--terracotta); border-bottom: 2px solid var(--terracotta); }

        /* 內容區 */
        main { flex: 1; padding: 20px; max-width: 800px; margin: 0 auto; width: 100%; }
        .section { display: none; animation: fadeIn 0.4s ease forwards; }
        .section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .item-card {
            display: flex;
            background: white;
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.2s ease;
        }

        .item-card:active { transform: scale(0.98); } /* 模擬 iOS 按壓 */

        .card-img { width: 130px; object-fit: cover; background: #eee; }
        .card-body { padding: 15px; flex: 1; }
        .card-body h3 { margin-bottom: 5px; color: var(--warm-brown); font-weight: 900; font-size: 1.1rem; }
        .card-body p { font-size: 0.8rem; color: #666; line-height: 1.5; }

        footer { text-align: center; padding: 30px; font-size: 0.7rem; color: #999; padding-bottom: calc(30px + var(--safe-bottom)); background: var(--mist); margin-top: auto;}

        @media (max-width: 480px) {
            .hero { height: 35vh; }
            .card-img { width: 110px; }
        }
    </style>
</head>
<body>

    <section class="hero">
        <h1 class="hero-title">台中旅遊誌</h1>
    </section>

    <nav id="navbar">
        <a href="javascript:void(0)" class="nav-link active" onclick="showTab('food', this)">🍜 台中美食</a>
        <a href="javascript:void(0)" class="nav-link" onclick="showTab('spots', this)">🏛️ 熱門地標</a>
    </nav>

    <main>
        <div id="food" class="section active">
            <div class="item-card">
                <img src="https://cdn-next.cybassets.com/s/files/22922/ckeditor/pictures/content_3094e569-c7c7-4d9e-ac86-2bbb13a5f6a8.jpg">
                <div class="card-body"><h3>太陽餅</h3><p>台中最經典的伴手禮，皮薄酥脆內餡麥芽香甜。</p></div>
            </div>
            <div class="item-card">
                <img src="https://www.chunshuitang.com.tw/upload/article_m/ALL_article_[C]_24E24_pFKFEXUAKh.webp">
                <div class="card-body"><h3>珍珠奶茶</h3><p>起源於台中的國際級飲品，茶香與Q彈嚼勁的完美平衡。</p></div>
            </div>
        </div>

        <div id="spots" class="section">
            <div class="item-card">
                <img src="https://travel.taichung.gov.tw/image/24379/1024x768" class="card-img" alt="景點" loading="lazy">
                <div class="card-body"><h3>國家歌劇院</h3><p>世界級曲牆建築，是台中最具代表性的藝文地標。</p></div>
            </div>
            <div class="item-card">
                <img src="https://travel.taichung.gov.tw/Utility/DisplayImage?id=25574" class="card-img" alt="高美" loading="lazy">
                <div class="card-body"><h3>高美濕地</h3><p>一生必遊一次的聖地，被譽為台灣的天空之鏡。</p></div>
            </div>
        </div>
    </main>

    <footer>© 2026 台中旅遊誌 · 看風景 放輕鬆</footer>

    <script>
        function showTab(id, el) {
            // 切換 Section
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            // 切換 Nav 狀態
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            el.classList.add('active');
            
            // 點擊後平滑滾動到導航列下方一點點，提升體驗
            window.scrollTo({ top: document.querySelector('.hero').offsetHeight - 20, behavior: 'smooth' });
        }
    </script>
</body>
</html>
